name: Deploy SharePoint MCP

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python -m py_compile server.py app.py
      - run: |
          mkdir deployment
          cp server.py app.py requirements.txt deployment/
          cp README.md .env.example deployment/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: sharepoint-mcp-package
          path: deployment/
          if-no-files-found: error
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sharepoint-mcp-package
          path: deployment
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_AD585C2DF0834D909CA6F9AD28F80013 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_895E34BA497B40B2815B484C0A64223B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_EA1B3BEEB284426E94CDE4414D7BDC55 }}
      - run: az account show --output table
      - uses: azure/webapps-deploy@v3
        with:
          app-name: sharepoint-mcp
          slot-name: Production
          package: deployment
      - if: always()
        run: az logout || true
