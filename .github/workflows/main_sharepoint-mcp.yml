name: Build and deploy SharePoint MCP to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Python application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate Python code
        run: python -m py_compile server.py

      - name: Prepare deployment package
        run: |
          mkdir deployment
          cp server.py deployment/
          cp requirements.txt deployment/
          cp README.md deployment/ || true
          cp .env.example deployment/ || true

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: sharepoint-mcp-package
          path: deployment/
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: Deploy to Azure Web App
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: sharepoint-mcp-package
          path: deployment

      - name: Login to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_AD585C2DF0834D909CA6F9AD28F80013 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_895E34BA497B40B2815B484C0A64223B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_EA1B3BEEB284426E94CDE4414D7BDC55 }}

      - name: Verify Azure connection
        run: |
          az account show \
            --query "{subscription:name,subscriptionId:id,tenantId:tenantId}" \
            --output table

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "sharepoint-mcp"
          slot-name: "Production"
          package: deployment

      - name: Logout from Azure
        if: always()
        run: az logout
