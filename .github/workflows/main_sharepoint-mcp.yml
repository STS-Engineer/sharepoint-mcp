name: Deploy SharePoint MCP

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python -m py_compile server.py app.py

      - name: Prepare deployment package
        run: |
          mkdir deployment
          cp server.py app.py requirements.txt deployment/
          cp README.md .env.example deployment/ 2>/dev/null || true

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: sharepoint-mcp
          slot-name: Production
          package: deployment
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
